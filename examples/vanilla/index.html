<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selkit — Vanilla smoke test</title>
    <link rel="stylesheet" href="../../packages/themes/base.css" />
    <script type="importmap">
      {
        "imports": {
          "@selkit/core": "../../packages/core/dist/index.js",
          "@selkit/dom": "../../packages/dom/dist/index.js"
        }
      }
    </script>
    <style>
      body {
        font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 { font-size: 1.4rem; }
      p.note { color: #64748b; font-size: 0.85rem; }
      section { margin: 24px 0; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Selkit — Vanilla smoke test</h1>
    <p class="note">
      驗證 <code>@selkit/dom</code> 的 dist 產物能跑（涵蓋核心 API 路徑）。完整 21 個互動 example 見
      <a href="https://cluion.github.io/selkit/examples">docs gallery</a>。
    </p>

    <section>
      <label>Single + search</label>
      <div id="single"></div>
    </section>
    <section>
      <label>Multiselect + tagging</label>
      <div id="multi"></div>
    </section>
    <section>
      <label>Async (loadOptions + pagination)</label>
      <div id="async"></div>
    </section>
    <section>
      <label>Virtual scroll (2000)</label>
      <div id="virtual"></div>
    </section>

    <script type="module">
      import { createSelkitDom } from '@selkit/dom'

      const fruits = [
        { value: 'apple', label: 'Apple' },
        { value: 'banana', label: 'Banana' },
        { value: 'cherry', label: 'Cherry' },
        { value: 'date', label: 'Date' },
        { value: 'elderberry', label: 'Elderberry' },
      ]
      const many = (n) =>
        Array.from({ length: n }, (_, i) => ({ value: i, label: `Option ${i + 1}` }))
      const db = many(2000)

      createSelkitDom(document.getElementById('single'), {
        options: fruits,
        placeholder: 'Pick a fruit…',
      })

      createSelkitDom(document.getElementById('multi'), {
        options: fruits,
        multiple: true,
        taggable: true,
        createTag: (q) => ({ value: q.toLowerCase(), label: q }),
        placeholder: 'Pick or type…',
      })

      createSelkitDom(document.getElementById('async'), {
        loadOptions: async (query, page) => {
          await new Promise((r) => setTimeout(r, 200))
          const filtered = db.filter((o) => o.label.includes(query))
          return {
            items: filtered.slice((page - 1) * 20, page * 20),
            hasMore: filtered.length > page * 20,
          }
        },
        debounce: 250,
        placeholder: 'Search…',
      })

      createSelkitDom(document.getElementById('virtual'), {
        options: many(2000),
        virtualScroll: true,
        itemHeight: 36,
        placeholder: '2000 options…',
      })
    </script>
  </body>
</html>
