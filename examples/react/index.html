<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selkit — React smoke test</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../packages/themes/base.css" />
    <link rel="stylesheet" href="../../packages/themes/bs5.css" />
    <!-- React 從 esm.sh 取 ESM external=react 確保只有一份 React 實例 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?external=react",
          "htm": "https://esm.sh/htm@3.1.1",
          "@selkit/core": "../../packages/core/dist/index.js",
          "@selkit/react": "../../packages/react/dist/index.js"
        }
      }
    </script>
    <style>
      body {
        font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 { font-size: 1.4rem; }
      p.note { color: #64748b; font-size: 0.85rem; }
      section { margin: 24px 0; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Selkit — React smoke test</h1>
    <p class="note">
      驗證 <code>@selkit/react</code> 的 dist 產物能跑（涵蓋核心 API 路徑）。完整 21 個互動 example 見
      <a href="https://cluion.github.io/selkit/examples">docs gallery</a>。
    </p>
    <div id="app"></div>

    <script type="module">
      import React from 'react'
      import { createRoot } from 'react-dom/client'
      import htm from 'htm'
      import { SelkitSelect } from '@selkit/react'

      const html = htm.bind(React.createElement)
      const { useState } = React

      const fruits = [
        { value: 'apple', label: 'Apple' },
        { value: 'banana', label: 'Banana' },
        { value: 'cherry', label: 'Cherry' },
        { value: 'date', label: 'Date' },
        { value: 'elderberry', label: 'Elderberry' },
      ]
      const many = (n) =>
        Array.from({ length: n }, (_, i) => ({ value: i, label: `Option ${i + 1}` }))
      const db = many(2000)
      const makeTag = (q) => ({ value: q.toLowerCase(), label: q })
      const loadOpts = async (query, page) => {
        await new Promise((r) => setTimeout(r, 200))
        const filtered = db.filter((o) => o.label.includes(query))
        return {
          items: filtered.slice((page - 1) * 20, page * 20),
          hasMore: filtered.length > page * 20,
        }
      }

      function App() {
        const [last, setLast] = useState('（尚未變更）')
        const onChange = (value) => setLast(JSON.stringify(value))

        return html`
          <${React.Fragment}>
            <section>
              <label>Single + search</label>
              <${SelkitSelect} options=${fruits} placeholder="Pick a fruit…" onChange=${onChange} />
            </section>
            <section>
              <label>Multiselect + tagging</label>
              <${SelkitSelect} options=${fruits} multiple=${true} taggable=${true} createTag=${makeTag} placeholder="Pick or type…" onChange=${onChange} />
            </section>
            <section>
              <label>Async (loadOptions + pagination)</label>
              <${SelkitSelect} loadOptions=${loadOpts} debounce=${250} placeholder="Search…" onChange=${onChange} />
            </section>
            <section>
              <label>Virtual scroll (2000)</label>
              <${SelkitSelect} options=${many(2000)} virtualScroll=${true} itemHeight=${36} placeholder="2000 options…" onChange=${onChange} />
            </section>
            <section>
              <label>change event</label>
              <pre>${last}</pre>
            </section>
          <//>
        `
      }

      createRoot(document.getElementById('app')).render(html`<${App} />`)
    </script>
  </body>
</html>
