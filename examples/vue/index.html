<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selkit — Vue Demo</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../packages/themes/base.css" />
    <link rel="stylesheet" href="../../packages/themes/bs5.css" />

    <!-- 裸 import 對應到 CDN 的 Vue 與各套件 dist 與 vanilla demo 一樣免打包 -->
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js",
          "@selkit/core": "../../packages/core/dist/index.js",
          "@selkit/vue": "../../packages/vue/dist/index.js"
        }
      }
    </script>

    <style>
      body {
        font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 { font-size: 1.4rem; }
      section { margin: 28px 0; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
      .hint { color: #64748b; font-size: 0.8rem; margin-top: 6px; }
      .bs5-scope { padding: 16px; border: 1px dashed #cbd5e1; border-radius: 8px; }
      pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 0.8rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Selkit — Vue Demo</h1>
    <p class="hint">同一顆 <code>@selkit/core</code>，這裡用 <code>@selkit/vue</code> 的 <code>&lt;SelkitSelect&gt;</code> 元件（v-model + slot）。</p>
    <div id="app"></div>

    <script type="module">
      import { createApp, ref } from 'vue'
      import { SelkitSelect } from '@selkit/vue'

      const fruits = [
        { value: 'apple', label: 'Apple' },
        { value: 'banana', label: 'Banana' },
        { value: 'cherry', label: 'Cherry' },
        { value: 'date', label: 'Date', disabled: true },
        { value: 'elderberry', label: 'Elderberry' },
        { value: 'fig', label: 'Fig' },
        { value: 'grape', label: 'Grape' },
      ]

      const berries = [
        { value: 'blueberry', label: 'Blueberry' },
        { value: 'blackberry', label: 'Blackberry' },
        { value: 'strawberry', label: 'Strawberry' },
        { value: 'raspberry', label: 'Raspberry' },
      ]

      const grouped = [
        {
          label: 'Fruit',
          options: [
            { value: 'apple', label: 'Apple' },
            { value: 'banana', label: 'Banana' },
          ],
        },
        {
          label: 'Vegetable',
          options: [
            { value: 'carrot', label: 'Carrot' },
            { value: 'potato', label: 'Potato' },
          ],
        },
      ]

      const many = (n) =>
        Array.from({ length: n }, (_, i) => ({
          value: i,
          label: `Option ${i + 1}`,
        }))

      const loadPage = async (query, page) => {
        const size = 20
        const start = (page - 1) * size
        const items = Array.from({ length: size }, (_, i) => {
          const num = start + i + 1
          return { value: num, label: `${query || 'Item'} #${num}` }
        })
        return { items, hasMore: page < 5 }
      }

      const App = {
        components: { SelkitSelect },
        setup() {
          const last = ref('（尚未變更）')
          const onChange = (e) => {
            last.value = JSON.stringify(e.value)
          }
          return { fruits, berries, grouped, many, loadPage, last, onChange }
        },
        template: `
          <section>
            <label>單選 + 搜尋</label>
            <SelkitSelect :options="fruits" placeholder="Pick a fruit…" @change="onChange" />
          </section>

          <section>
            <label>多選</label>
            <SelkitSelect :options="fruits" multiple placeholder="Pick fruits…" @change="onChange" />
          </section>

          <section>
            <label>分組 optgroup</label>
            <SelkitSelect :options="grouped" placeholder="Pick one…" @change="onChange" />
          </section>

          <section>
            <label>fuzzy 模糊搜尋（試試 "blbr"）</label>
            <SelkitSelect :options="berries" fuzzy placeholder="Fuzzy…" @change="onChange" />
          </section>

          <section>
            <label>minInputLength（至少 2 字才過濾）</label>
            <SelkitSelect :options="many(30)" :min-input-length="2" placeholder="Type 2+ chars…" @change="onChange" />
          </section>

          <section>
            <label>minResultsForSearch（選項太少時隱藏搜尋框）</label>
            <SelkitSelect :options="fruits" :min-results-for-search="10" placeholder="No search box…" @change="onChange" />
          </section>

          <section>
            <label>hideSelected + tag 拖曳排序</label>
            <SelkitSelect :options="fruits" multiple hide-selected placeholder="Pick & drag tags…" @change="onChange" />
          </section>

          <section>
            <label>無限捲動 infinite scroll</label>
            <SelkitSelect :load-options="loadPage" placeholder="Scroll to load more…" @change="onChange" />
          </section>

          <section>
            <label>虛擬捲動 virtual scroll（1000 筆）</label>
            <SelkitSelect :options="many(1000)" virtual-scroll :item-height="36" placeholder="1000 options…" @change="onChange" />
          </section>

          <section dir="rtl">
            <label>RTL（dir="rtl"）</label>
            <SelkitSelect :options="fruits" multiple placeholder="اختر…" @change="onChange" />
          </section>

          <section class="bs5-scope">
            <label>Bootstrap 5 theme</label>
            <div class="selkit-theme-bs5">
              <SelkitSelect :options="fruits" placeholder="Bootstrap 5 style…" @change="onChange" />
            </div>
          </section>

          <section>
            <label>最後一次變更 (change event)</label>
            <pre>{{ last }}</pre>
          </section>
        `,
      }

      createApp(App).mount('#app')
    </script>
  </body>
</html>
