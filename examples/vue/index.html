<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Selkit — Vue smoke test</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../packages/themes/base.css" />
    <link rel="stylesheet" href="../../packages/themes/bs5.css" />
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js",
          "@selkit/core": "../../packages/core/dist/index.js",
          "@selkit/vue": "../../packages/vue/dist/index.js"
        }
      }
    </script>
    <style>
      body {
        font-family: system-ui, -apple-system, "Noto Sans TC", sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        color: #1e293b;
      }
      h1 { font-size: 1.4rem; }
      p.note { color: #64748b; font-size: 0.85rem; }
      section { margin: 24px 0; }
      label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Selkit — Vue smoke test</h1>
    <p class="note">
      驗證 <code>@selkit/vue</code> 的 dist 產物能跑（涵蓋核心 API 路徑）。完整 21 個互動 example 見
      <a href="https://cluion.github.io/selkit/examples">docs gallery</a>。
    </p>
    <div id="app"></div>

    <script type="module">
      import { createApp, ref } from 'vue'
      import { SelkitSelect } from '@selkit/vue'

      const fruits = [
        { value: 'apple', label: 'Apple' },
        { value: 'banana', label: 'Banana' },
        { value: 'cherry', label: 'Cherry' },
        { value: 'date', label: 'Date' },
        { value: 'elderberry', label: 'Elderberry' },
      ]
      const many = (n) =>
        Array.from({ length: n }, (_, i) => ({ value: i, label: `Option ${i + 1}` }))
      const db = many(2000)

      const App = {
        components: { SelkitSelect },
        setup() {
          const last = ref('（尚未變更）')
          const onChange = (e) => {
            last.value = JSON.stringify(e.value)
          }
          const makeTag = (q) => ({ value: q.toLowerCase(), label: q })
          const loadOpts = async (query, page) => {
            await new Promise((r) => setTimeout(r, 200))
            const filtered = db.filter((o) => o.label.includes(query))
            return {
              items: filtered.slice((page - 1) * 20, page * 20),
              hasMore: filtered.length > page * 20,
            }
          }
          return { fruits, many, last, onChange, makeTag, loadOpts }
        },
        template: `
          <section>
            <label>Single + search</label>
            <SelkitSelect :options="fruits" placeholder="Pick a fruit…" @change="onChange" />
          </section>
          <section>
            <label>Multiselect + tagging</label>
            <SelkitSelect :options="fruits" multiple taggable :create-tag="makeTag" placeholder="Pick or type…" @change="onChange" />
          </section>
          <section>
            <label>Async (loadOptions + pagination)</label>
            <SelkitSelect :load-options="loadOpts" :debounce="250" placeholder="Search…" @change="onChange" />
          </section>
          <section>
            <label>Virtual scroll (2000)</label>
            <SelkitSelect :options="many(2000)" virtual-scroll :item-height="36" placeholder="2000 options…" @change="onChange" />
          </section>
          <section>
            <label>change event</label>
            <pre>{{ last }}</pre>
          </section>
        `,
      }

      createApp(App).mount('#app')
    </script>
  </body>
</html>
