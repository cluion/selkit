name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# 讓 GITHUB_TOKEN 能部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署 不取消進行中的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # docs 引用 workspace 套件（@selkit/vue、@selkit/themes）的 dist 產物，需先 build
      - name: Build packages
        run: pnpm build

      - name: Build docs
        run: pnpm --filter @selkit/docs docs:build
        env:
          DOCS_BASE: /selkit/

      # 前置：到 repo Settings → Pages → Source 選 "GitHub Actions"（首次一次性手動設定）
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
